name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3

    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version-file: go.mod

    - name: Build
      run: make build

    - name: Install Dependencies
      run: sudo apt-get update && sudo apt-get install -y bats skopeo curl

    - name: Test
      run: make test

  kind-e2e:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3

    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version-file: go.mod

    - name: Install Dependencies
      run: sudo apt-get update && sudo apt-get install -y bats curl

    - name: WebDAV -> kind end-to-end test
      run: make kind-test
