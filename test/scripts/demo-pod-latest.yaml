# Companion to demo-pod.yaml: launches the SAME payload via the "latest"
# tag, which saor resolves by following a symlink on the storage
# backend (myrepo/latest -> mytag) rather than a real directory - the usual
# way registries alias a moving "latest" tag onto a fixed one.
apiVersion: v1
kind: Pod
metadata:
  name: saor-demo-latest
  labels:
    app: saor-demo-latest
spec:
  containers:
    - name: demo
      image: localhost:5001/myrepo:latest
      imagePullPolicy: Always
      command: ["/app"]
  restartPolicy: Never
